<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warren C. Bennett's Retro Future</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --neon-green: #39ff14;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #0a0a1f 0%, #1a0033 100%);
            color: var(--neon-blue);
            font-family: 'Press Start 2P', cursive;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .tv-frame {
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16 / 12.5;
            background: #1a1a1a;
            border: 30px solid #111;
            border-radius: 10px;
            box-shadow: 0 0 80px var(--neon-pink), 0 0 140px var(--neon-blue);
            padding: 20px;
            display: flex;
        }
        
        .screen {
            flex: 1;
            background: #000;
            border: 10px solid #222;
            overflow: hidden;
            position: relative;
        }
        
        .content {
            padding: 20px;
            height: 100%;
            overflow-y: auto;
        }
        
        .section { display: none; }
        .section.active { display: block; }
        
        .channel-title {
            font-size: 18px;
            color: var(--neon-green);
            margin-bottom: 15px;
            text-shadow: 0 0 10px var(--neon-green);
            border-bottom: 3px solid var(--neon-green);
            padding-bottom: 8px;
        }
        
        .right-panel {
            width: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 35px;
            margin-left: 20px;
            align-items: center;
        }
        
        .knob {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 30% 30%, #666, #222);
            border: 6px solid #111;
            border-radius: 50%;
            box-shadow: inset 0 0 12px #000, 0 0 15px var(--neon-green);
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        
        .knob-label {
            text-align: center;
            font-size: 11px;
            color: #ffcc00;
            margin-top: 8px;
            text-shadow: 0 0 6px #ffcc00;
        }
        
        @media (max-width: 768px) {
            .tv-frame { flex-direction: column; }
            .right-panel { flex-direction: row; margin-left: 0; margin-top: 15px; }
        }
    </style>
</head>
<body>
    <div class="tv-frame">
        <div class="screen">
            <div class="content" id="content"></div>
        </div>
        
        <div class="right-panel">
            <div>
                <div class="knob" id="vhfKnob"></div>
                <div class="knob-label">VHF</div>
            </div>
            <div>
                <div class="knob" id="uhfKnob"></div>
                <div class="knob-label">UHF</div>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'vhf';
        let vhfIndex = 0;
        let uhfIndex = 0;
        let lastMode = 'vhf';
        let scheduleData = { vhf: [], uhf: [] };

        async function loadSchedule() {
            try {
                const res = await fetch('https://retro-tv-website.onrender.com/api/schedule');
                if (!res.ok) throw new Error('Backend error');
                scheduleData = await res.json();
            } catch (err) {
                console.error("Using fallback data");
                scheduleData = {
                    vhf: [
                        { id: "home", name: "HOME", schedule: "Welcome message" },
                        { id: "writing", name: "WRITING", schedule: "Random Encounters" },
                        { id: "games", name: "GAMES", schedule: "Retro gaming hub" },
                        { id: "pixelart", name: "PIXEL ART", schedule: "Pixel Art Galleries" },
                        { id: "films", name: "FILMS", schedule: "Film related content" },
                        { id: "tv", name: "TV", schedule: "TV related content" },
                        { id: "where", name: "WHERE CAN YOU FIND ME?", schedule: "Social links" }
                    ],
                    uhf: [
                        { id: "uhf1", name: "CARTOONS", schedule: "Public Domain Cartoons" },
                        { id: "uhf2", name: "CARTOONS", schedule: "More Public Domain Cartoons" },
                        { id: "uhf3", name: "TV SHOWS", schedule: "Classic Public Domain TV" },
                        { id: "uhf4", name: "TV SHOWS", schedule: "More Classic TV" },
                        { id: "uhf5", name: "FILMS", schedule: "Double Indemnity - All day" },
                        { id: "uhf6", name: "FILMS", schedule: "More Public Domain Films" }
                    ]
                };
            }
        }

        function generateContent() {
            const container = document.getElementById('content');
            container.innerHTML = '';

            scheduleData.vhf.forEach((ch, i) => {
                const div = document.createElement('div');
                div.id = ch.id;
                div.className = 'section vhf-section';
                div.innerHTML = `<h2 class="channel-title">VHF ${i + 2} • ${ch.name}</h2><p>${ch.schedule || ''}</p>`;
                container.appendChild(div);
            });

            scheduleData.uhf.forEach((ch, i) => {
                const div = document.createElement('div');
                div.id = ch.id;
                div.className = 'section uhf-section';
                div.innerHTML = `<h2 class="channel-title">UHF ${i + 2} • ${ch.name}</h2><p>${ch.schedule || ''}</p>`;
                container.appendChild(div);
            });
        }

        function updateDisplay() {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));

            if (currentMode === 'vhf') {
                if (vhfIndex > 0) {
                    const ch = scheduleData.vhf[vhfIndex - 1];
                    if (ch && document.getElementById(ch.id)) {
                        document.getElementById(ch.id).classList.add('active');
                    }
                }
            } else {
                if (uhfIndex > 0) {
                    const ch = scheduleData.uhf[uhfIndex - 1];
                    if (ch && document.getElementById(ch.id)) {
                        document.getElementById(ch.id).classList.add('active');
                    }
                }
            }
        }

        function nextVHF() {
            if (lastMode !== 'vhf') vhfIndex = 0;
            else vhfIndex = (vhfIndex + 1) % (scheduleData.vhf.length + 1);
            currentMode = 'vhf';
            lastMode = 'vhf';
            document.getElementById('vhfKnob').style.transform = `rotate(${(vhfIndex * 45) % 360}deg)`;
            updateDisplay();
        }

        function nextUHF() {
            if (lastMode !== 'uhf') uhfIndex = 0;
            else uhfIndex = (uhfIndex + 1) % (scheduleData.uhf.length + 1);
            currentMode = 'uhf';
            lastMode = 'uhf';
            document.getElementById('uhfKnob').style.transform = `rotate(${(uhfIndex * 45) % 360}deg)`;
            updateDisplay();
        }

        async function init() {
            await loadSchedule();
            generateContent();
            updateDisplay();
        }

        document.getElementById('vhfKnob').addEventListener('click', nextVHF);
        document.getElementById('uhfKnob').addEventListener('click', nextUHF);

        init();
    </script>
</body>
</html>
