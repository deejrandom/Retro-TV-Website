<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warren C. Bennett's Retro Future</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --neon-green: #39ff14;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #0a0a1f 0%, #1a0033 100%);
            color: var(--neon-blue);
            font-family: 'Press Start 2P', cursive;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        
        .tv-frame {
            width: 100%;
            max-width: 980px;
            aspect-ratio: 16 / 12.5;
            background: #1a1a1a;
            border: 32px solid #111;
            border-radius: 12px;
            box-shadow: 0 0 80px var(--neon-pink), 
                        0 0 140px var(--neon-blue),
                        inset 0 0 60px rgba(0,0,0,0.95);
            position: relative;
            z-index: 2;
            padding: 22px;
            display: flex;
        }
        
        .screen {
            flex: 1;
            background: #000;
            border: 12px solid #222;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9);
            position: relative;
        }
        
        .screen::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                transparent 0px,
                transparent 2px,
                rgba(255,255,255,0.055) 2px,
                rgba(255,255,255,0.055) 4px
            );
            pointer-events: none;
            z-index: 5;
            animation: scanline 4s linear infinite;
        }
        
        .content { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            position: relative;
            z-index: 6;
        }
        
        .section { display: none; }
        .section.active { display: block; }
        
        .channel-title {
            font-size: 17px;
            color: var(--neon-green);
            margin-bottom: 12px;
            text-shadow: 0 0 10px var(--neon-green);
            border-bottom: 3px solid var(--neon-green);
            padding-bottom: 6px;
        }
        
        .right-panel {
            width: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 30px;
            margin-left: 20px;
            align-items: center;
        }
        
        .knob {
            width: 54px;
            height: 54px;
            background: radial-gradient(circle at 30% 30%, #666, #222);
            border: 6px solid #111;
            border-radius: 50%;
            box-shadow: inset 0 0 12px #000, 0 0 14px var(--neon-green);
            position: relative;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        
        .knob::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 20px;
            background: #ffcc00;
            transform: translate(-50%, -50%) rotate(45deg);
        }
        
        .knob-label {
            text-align: center;
            font-size: 10px;
            color: #ffcc00;
            margin-top: 6px;
            text-shadow: 0 0 6px #ffcc00;
            font-weight: bold;
        }
        
        .guide-grid {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 6px 14px;
            font-size: 12px;
            background: #0a0a1f;
            padding: 10px;
            border: 2px solid #334455;
        }
        
        .guide-entry {
            cursor: pointer;
            padding: 6px 8px;
            transition: all 0.1s ease;
        }
        
        .guide-entry:hover {
            background: rgba(57, 255, 20, 0.15);
            color: var(--neon-green);
        }
        
        .guide-channel-num {
            color: #ffcc00;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="tv-frame">
        <div class="screen">
            <div class="content"></div>
            
            <div class="static" id="staticOverlay"></div>
            <div class="no-signal-text" id="noSignalText">NO SIGNAL<br><span style="font-size:11px;">CHANNEL OFF AIR</span></div>
        </div>
        
        <!-- Knobs on the RIGHT SIDE -->
        <div class="right-panel">
            <div>
                <div class="knob" id="vhfKnob"></div>
                <div class="knob-label">VHF</div>
            </div>
            <div>
                <div class="knob" id="uhfKnob"></div>
                <div class="knob-label">UHF</div>
            </div>
        </div>
    </div>

 <script>
    // =====================
    // 1. VARIABLES
    // =====================
    let currentMode = 'vhf';
    let vhfIndex = 0;
    let uhfIndex = 0;
    let lastMode = 'vhf';
    let scheduleData = { vhf: [], uhf: [] };
    let vRot = 0;
    let uRot = 0;

    // =====================
    // 2. FUNCTIONS
    // =====================
    function loadSchedule() {
        scheduleData = {
            vhf: [
                { id: "home", name: "HOME", schedule: "Welcome message" },
                { id: "writing", name: "WRITING", schedule: "Random Encounters" },
                { id: "games", name: "GAMES", schedule: "Retro gaming hub" },
                { id: "pixelart", name: "PIXEL ART", schedule: "Pixel Art Galleries" },
                { id: "films", name: "FILMS", schedule: "Film related content" },
                { id: "tv", name: "TV", schedule: "TV related content" },
                { id: "where", name: "WHERE CAN YOU FIND ME?", schedule: "Social links" }
            ],
            uhf: [
                { id: "uhf1", name: "CARTOONS", schedule: "Public Domain Cartoons" },
                { id: "uhf2", name: "CARTOONS", schedule: "More Public Domain Cartoons" },
                { id: "uhf3", name: "TV SHOWS", schedule: "Classic Public Domain TV" },
                { id: "uhf4", name: "TV SHOWS", schedule: "More Classic TV" },
                { id: "uhf5", name: "FILMS", schedule: "Double Indemnity - All day" },
                { id: "uhf6", name: "FILMS", schedule: "More Public Domain Films" }
            ]
        };
    }

    function generateContent() {
        const container = document.querySelector('.content');
        container.innerHTML = '';

        // VHF channels
        scheduleData.vhf.forEach((ch, i) => {
            const div = document.createElement('div');
            div.id = ch.id;
            div.className = 'section vhf-section';
            const channelNum = i + 2;
            div.innerHTML = `<h2 class="channel-title">VHF ${channelNum} • ${ch.name}</h2><p>${ch.schedule}</p>`;
            container.appendChild(div);
        });

        // UHF channels
        scheduleData.uhf.forEach((ch, i) => {
            const div = document.createElement('div');
            div.id = ch.id;
            div.className = 'section uhf-section';
            const channelNum = i + 2;
            div.innerHTML = `<h2 class="channel-title">UHF ${channelNum} • ${ch.name}</h2><p>${ch.schedule}</p>`;
            container.appendChild(div);
        });

        // VHF Guide
        const vGuide = document.createElement('div');
        vGuide.id = 'vhfguide';
        vGuide.className = 'section vhf-section';
        let vhtml = `<h2 class="channel-title">VHF 0 • CHANNEL GUIDE</h2>`;
        vhtml += `<div style="background:#0a0a1f; padding:14px; border:3px solid #334455;">`;
        vhtml += `<div style="color:#ffcc00; font-size:11px; margin-bottom:10px; text-align:center;">MONDAY • JUNE 17, 2026</div>`;
        vhtml += `<div class="guide-grid">`;
        vhtml += `<div class="guide-entry guide-channel-num" onclick="showVHFGuide()">VHF 0</div>`;
        vhtml += `<div class="guide-entry" onclick="showVHFGuide()">VHF GUIDE</div>`;
        scheduleData.vhf.forEach((ch, i) => {
            const channelNum = i + 2;
            vhtml += `<div class="guide-entry guide-channel-num" onclick="jumpToVHF(${i + 1})">VHF ${channelNum}</div>`;
            vhtml += `<div class="guide-entry" onclick="jumpToVHF(${i +1})">${ch.name}</div>`;
        });
        vhtml += `</div></div>`;
        vGuide.innerHTML = vhtml;
        container.appendChild(vGuide);

        // UHF Guide
        const uGuide = document.createElement('div');
        uGuide.id = 'uhfguide';
        uGuide.className = 'section uhf-section';
        let uhtml = `<h2 class="channel-title">UHF 0 • CHANNEL GUIDE</h2>`;
        uhtml += `<div style="background:#0a0a1f; padding:14px; border:3px solid #334455;">`;
        uhtml += `<div style="color:#ffcc00; font-size:11px; margin-bottom:10px; text-align:center;">MONDAY • JUNE 17, 2026</div>`;
        uhtml += `<div class="guide-grid">`;
        uhtml += `<div class="guide-entry guide-channel-num" onclick="showUHFGuide()">UHF 0</div>`;
        uhtml += `<div class="guide-entry" onclick="showUHFGuide()">UHF GUIDE</div>`;
        scheduleData.uhf.forEach((ch, i) => {
            const channelNum = i + 2;
            let displayName = ch.schedule;
            uhtml += `<div class="guide-entry guide-channel-num" onclick="jumpToUHF(${i + 1})">UHF ${channelNum}</div>`;
            uhtml += `<div class="guide-entry" onclick="jumpToUHF(${i +1})">${displayName}</div>`;
        });
        uhtml += `</div></div>`;
        uGuide.innerHTML = uhtml;
        container.appendChild(uGuide);
    }

    function showVHFGuide() {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('vhfguide').classList.add('active');
    }

    function showUHFGuide() {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('uhfguide').classList.add('active');
    }

    function updateDisplay() {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    const st = document.getElementById('staticOverlay');
    const tx = document.getElementById('noSignalText');

    if (currentMode === 'vhf') {
        if (vhfIndex === 0) {
            // Show VHF Guide
            document.getElementById('vhfguide').classList.add('active');
        } else {
            // Show actual VHF channel
            const ch = scheduleData.vhf[vhfIndex - 1];
            if (ch && document.getElementById(ch.id)) {
                document.getElementById(ch.id).classList.add('active');
            }
        }
        st.style.display = 'none';
        tx.style.display = 'none';
    } else {
        if (uhfIndex === 0) {
            // Show UHF Guide
            document.getElementById('uhfguide').classList.add('active');
        } else {
            // Show actual UHF channel
            const ch = scheduleData.uhf[uhfIndex - 1];
            if (ch && document.getElementById(ch.id)) {
                document.getElementById(ch.id).classList.add('active');
            }
        }
        st.style.display = 'block';
        tx.style.display = 'block';
    }
}

    function jumpToVHF(index) {
        currentMode = 'vhf';
        vhfIndex = index;
        updateDisplay();
    }

    function jumpToUHF(index) {
        currentMode = 'uhf';
        uhfIndex = index;
        updateDisplay();
    }

    function nextVHF() {
    if (lastMode !== 'vhf') {
        vhfIndex = 0;
    } else {
        vhfIndex = (vhfIndex + 1) % (scheduleData.vhf.length + 1);
    }
    currentMode = 'vhf';
    lastMode = 'vhf';
    vRot = (vRot + 45) % 360;
    vKnob.style.transform = `rotate(${vRot}deg)`;
    updateDisplay();
}

    function nextUHF() {
    if (lastMode !== 'uhf') {
        uhfIndex = 0;
    } else {
        uhfIndex = (uhfIndex + 1) % (scheduleData.uhf.length + 1);
    }
    currentMode = 'uhf';
    lastMode = 'uhf';
    uRot = (uRot + 45) % 360;
    uKnob.style.transform = `rotate(${uRot}deg)`;
    updateDisplay();
}

    function init() {
        loadSchedule();
        generateContent();
        showVHFGuide();
        lastMode = 'vhf';
    }

    // =====================
    // 3. EVENT LISTENERS + INITIALIZATION
    // =====================
    const vKnob = document.getElementById('vhfKnob');
    const uKnob = document.getElementById('uhfKnob');

    vKnob.addEventListener('click', nextVHF);
    uKnob.addEventListener('click', nextUHF);

    init();

</script>
</body>
</html>
