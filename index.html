<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warren C. Bennett's Retro Future</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
       
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --neon-green: #39ff14;
        }
       
        * { margin: 0; padding: 0; box-sizing: border-box; }
       
        body {
            background: linear-gradient(135deg, #0a0a1f 0%, #1a0033 100%);
            color: var(--neon-blue);
            font-family: 'Press Start 2P', cursive;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
       
        .tv-frame {
            width: 100%;
            max-width: 1020px;
            aspect-ratio: 16 / 12.5;
            background: #1a1a1a;
            border: 32px solid #111;
            border-radius: 12px;
            box-shadow: 0 0 80px var(--neon-pink),
                        0 0 140px var(--neon-blue),
                        inset 0 0 60px rgba(0,0,0,0.95);
            position: relative;
            z-index: 2;
            padding: 22px;
            display: flex;
        }
       
        .screen {
            flex: 1;
            background: #000;
            border: 12px solid #222;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9);
            position: relative;
        }
       
        .content {
            flex: 1;
            padding: 15px 20px 20px;
            overflow-y: auto;
            position: relative;
            z-index: 6;
        }
       
        .section { display: none; }
        .section.active { display: block; }
       
        .channel-title {
            font-size: 17px;
            color: var(--neon-green);
            margin-bottom: 12px;
            text-shadow: 0 0 10px var(--neon-green);
            border-bottom: 3px solid var(--neon-green);
            padding-bottom: 6px;
        }
       
        .right-panel {
            width: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 30px;
            margin-left: 20px;
            align-items: center;
        }
       
        .knob {
            width: 54px;
            height: 54px;
            background: radial-gradient(circle at 30% 30%, #666, #222);
            border: 6px solid #111;
            border-radius: 50%;
            box-shadow: inset 0 0 12px #000, 0 0 14px var(--neon-green);
            position: relative;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
       
        .knob::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 20px;
            background: #ffcc00;
            transform: translate(-50%, -50%) rotate(45deg);
        }
       
        .knob-label {
            text-align: center;
            font-size: 10px;
            color: #ffcc00;
            margin-top: 6px;
            text-shadow: 0 0 6px #ffcc00;
            font-weight: bold;
        }

        /* Link Cards & Gallery */
        .linkcards-grid, .gallery-groups-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 15px;
        }

        .link-card, .gallery-group-card {
            background: #111;
            border: 3px solid #556677;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            color: inherit;
        }

        .link-card:hover, .gallery-group-card:hover {
            border-color: #ffcc00;
            transform: translateY(-3px);
        }

        .link-card img, .gallery-group-card img {
            width: 100%;
            height: auto;
            max-height: 160px;
            object-fit: cover;
            border: 2px solid #333;
            margin-bottom: 10px;
        }

        .group-name {
            background: #1a1a2e;
            color: #ffcc00;
            font-size: 13px;
            padding: 8px;
            text-align: center;
            border-top: 2px solid #334455;
        }

        /* LIGHTBOX */
        #lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        #lightbox.active {
            display: flex;
        }

        #lightbox img {
            max-width: 90vw;
            max-height: 75vh;
            border: 4px solid #556677;
        }

        .lightbox-controls {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }

        .lightbox-btn {
            background: #222;
            color: #ffcc00;
            border: 3px solid #556677;
            padding: 10px 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            cursor: pointer;
        }

        .lightbox-btn:hover {
            background: #ffcc00;
            color: #000;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .tv-frame {
                flex-direction: column;
            }
            .right-panel {
                flex-direction: row;
                margin-left: 0;
                margin-top: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="tv-frame">
        <div class="screen">
            <div class="content"></div>
            <div class="no-signal-text" id="noSignalText" style="display:none;">NO SIGNAL<br><span style="font-size:12px;">CHANNEL OFF AIR</span></div>
        </div>
       
        <div class="right-panel">
            <div>
                <div class="knob" id="vhfKnob"></div>
                <div class="knob-label">VHF</div>
            </div>
            <div>
                <div class="knob" id="uhfKnob"></div>
                <div class="knob-label">UHF</div>
            </div>
        </div>
    </div>

    <!-- LIGHTBOX -->
    <div id="lightbox">
        <img id="lightbox-image" src="" alt="">
        <div class="lightbox-controls">
            <button class="lightbox-btn" onclick="prevLightboxImage()">◀ Prev</button>
            <div id="lightbox-counter"></div>
            <button class="lightbox-btn" onclick="nextLightboxImage()">Next ▶</button>
            <button class="lightbox-btn" onclick="closeLightbox()" style="margin-left: 30px;">Close</button>
        </div>
    </div>

    <script>
        let currentMode = 'vhf';
        let vhfIndex = 0;
        let uhfIndex = 0;
        let lastMode = 'vhf';
        let scheduleData = { vhf: [], uhf: [] };
        let vRot = 0;
        let uRot = 0;

        let currentGalleryImages = [];
        let currentLightboxIndex = 0;

        async function loadSchedule() {
            try {
                const res = await fetch('https://retro-tv-website.onrender.com/api/schedule');
                if (!res.ok) throw new Error('Backend error');
                scheduleData = await res.json();
            } catch (err) {
                console.error("Failed to load schedule from backend. Using fallback.");
                // Fallback data so the site doesn't break completely
                scheduleData = {
                    vhf: [
                        { id: "home", name: "HOME", schedule: "Welcome message" },
                        { id: "writing", name: "WRITING", schedule: "Random Encounters" },
                        { id: "games", name: "GAMES", schedule: "Retro gaming hub" },
                        { id: "pixelart", name: "PIXEL ART", schedule: "Pixel Art Galleries", presentation: "gallery", media: [] },
                        { id: "films", name: "FILMS", schedule: "Film related content" },
                        { id: "tv", name: "TV", schedule: "TV related content" },
                        { id: "where", name: "WHERE CAN YOU FIND ME?", schedule: "Social links" }
                    ],
                    uhf: [
                        { id: "uhf1", name: "CARTOONS", schedule: "Public Domain Cartoons" },
                        { id: "uhf2", name: "CARTOONS", schedule: "More Public Domain Cartoons" },
                        { id: "uhf3", name: "TV SHOWS", schedule: "Classic Public Domain TV" },
                        { id: "uhf4", name: "TV SHOWS", schedule: "More Classic TV" },
                        { id: "uhf5", name: "FILMS", schedule: "Double Indemnity - All day" },
                        { id: "uhf6", name: "FILMS", schedule: "More Public Domain Films" }
                    ]
                };
            }
        }

        function generateContent() {
            const container = document.querySelector('.content');
            container.innerHTML = '';

            // Basic channel rendering (you can expand this with your full logic)
            scheduleData.vhf.forEach((ch, i) => {
                const div = document.createElement('div');
                div.id = ch.id;
                div.className = 'section vhf-section';
                div.innerHTML = `<h2 class="channel-title">VHF ${i + 2} • ${ch.name}</h2><p>${ch.schedule}</p>`;
                container.appendChild(div);
            });

            scheduleData.uhf.forEach((ch, i) => {
                const div = document.createElement('div');
                div.id = ch.id;
                div.className = 'section uhf-section';
                div.innerHTML = `<h2 class="channel-title">UHF ${i + 2} • ${ch.name}</h2><p>${ch.schedule}</p>`;
                container.appendChild(div);
            });
        }

        function updateDisplay() {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));

            const noSignal = document.getElementById('noSignalText');
            if (!noSignal) return; // Safety check

            if (currentMode === 'vhf') {
                if (vhfIndex === 0) {
                    // Show guide
                } else {
                    const ch = scheduleData.vhf[vhfIndex - 1];
                    if (ch && document.getElementById(ch.id)) {
                        document.getElementById(ch.id).classList.add('active');
                    }
                }
            } else {
                if (uhfIndex === 0) {
                    // Show guide
                } else {
                    const ch = scheduleData.uhf[uhfIndex - 1];
                    if (ch && document.getElementById(ch.id)) {
                        document.getElementById(ch.id).classList.add('active');
                    }
                }
            }
        }

        function nextVHF() {
            if (lastMode !== 'vhf') vhfIndex = 0;
            else vhfIndex = (vhfIndex + 1) % (scheduleData.vhf.length + 1);
            currentMode = 'vhf';
            lastMode = 'vhf';
            vRot = (vRot + 45) % 360;
            document.getElementById('vhfKnob').style.transform = `rotate(${vRot}deg)`;
            updateDisplay();
        }

        function nextUHF() {
            if (lastMode !== 'uhf') uhfIndex = 0;
            else uhfIndex = (uhfIndex + 1) % (scheduleData.uhf.length + 1);
            currentMode = 'uhf';
            lastMode = 'uhf';
            uRot = (uRot + 45) % 360;
            document.getElementById('uhfKnob').style.transform = `rotate(${uRot}deg)`;
            updateDisplay();
        }

        async function init() {
            await loadSchedule();
            generateContent();
            updateDisplay();
        }

        document.getElementById('vhfKnob').addEventListener('click', nextVHF);
        document.getElementById('uhfKnob').addEventListener('click', nextUHF);

        init();
    </script>
</body>
</html>
