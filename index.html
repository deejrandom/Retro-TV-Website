<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warren C. Bennett's Retro Future</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --neon-green: #39ff14;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #0a0a1f 0%, #1a0033 100%);
            color: var(--neon-blue);
            font-family: 'Press Start 2P', cursive;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        
        .tv-frame {
            width: 100%;
            max-width: 1020px;
            aspect-ratio: 16 / 12.5;
            background: #1a1a1a;
            border: 32px solid #111;
            border-radius: 12px;
            box-shadow: 0 0 80px var(--neon-pink), 0 0 140px var(--neon-blue);
            padding: 22px;
            display: flex;
        }
        
        .screen {
            flex: 1;
            background: #000;
            border: 12px solid #222;
            overflow: hidden;
            position: relative;
        }
        
        .content {
            padding: 20px;
            height: 100%;
            overflow-y: auto;
        }
        
        .section { display: none; }
        .section.active { display: block; }
        
        .channel-title {
            font-size: 17px;
            color: var(--neon-green);
            margin-bottom: 15px;
            text-shadow: 0 0 10px var(--neon-green);
            border-bottom: 3px solid var(--neon-green);
            padding-bottom: 8px;
        }

        /* Knobs */
        .right-panel {
            width: 75px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 30px;
            margin-left: 20px;
            align-items: center;
        }
        
        .knob {
            width: 58px;
            height: 58px;
            background: radial-gradient(circle at 30% 30%, #666, #222);
            border: 6px solid #111;
            border-radius: 50%;
            box-shadow: inset 0 0 12px #000, 0 0 15px var(--neon-green);
            cursor: pointer;
            position: relative;
            transition: transform 0.1s ease;
        }
        
        .knob::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 18px;
            background: #ffcc00;
            transform: translate(-50%, -50%) rotate(45deg);
        }
        
        .knob-label {
            text-align: center;
            font-size: 11px;
            color: #ffcc00;
            margin-top: 8px;
            text-shadow: 0 0 6px #ffcc00;
        }

        /* Guide */
        .guide-scroll-container {
            height: 380px;
            overflow: hidden;
            border: 3px solid #334455;
            background: #0a0a1f;
        }
        
        .guide-grid {
            display: grid;
            grid-template-columns: 100px 1fr;
            gap: 6px 14px;
            font-size: 12px;
            padding: 10px;
        }
        
        .guide-entry {
            cursor: pointer;
            padding: 6px 8px;
        }
        
        .guide-entry:hover {
            background: rgba(57, 255, 20, 0.15);
            color: var(--neon-green);
        }
        
        .guide-separator {
            grid-column: 1 / -1;
            height: 3px;
            background: linear-gradient(to right, transparent, #39ff14, transparent);
            margin: 12px 0;
        }

        /* Gallery */
        .gallery-groups-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        
        .gallery-group-card {
            background: #111;
            border: 3px solid #556677;
            overflow: hidden;
            cursor: pointer;
        }
        
        .gallery-group-card:hover {
            border-color: #ffcc00;
            transform: translateY(-3px);
        }
        
        .gallery-group-card img {
            width: 100%;
            display: block;
        }
        
        .group-name {
            background: #1a1a2e;
            color: #ffcc00;
            font-size: 13px;
            padding: 8px;
            text-align: center;
        }

        /* Lightbox */
        #lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        #lightbox.active { display: flex; }
        
        #lightbox img {
            max-width: 90vw;
            max-height: 75vh;
            border: 4px solid #556677;
        }
        
        .lightbox-controls {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }
        
        .lightbox-btn {
            background: #222;
            color: #ffcc00;
            border: 3px solid #556677;
            padding: 10px 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="tv-frame">
        <div class="screen">
            <div class="content" id="content"></div>
        </div>
        
        <div class="right-panel">
            <div>
                <div class="knob" id="vhfKnob"></div>
                <div class="knob-label">VHF</div>
            </div>
            <div>
                <div class="knob" id="uhfKnob"></div>
                <div class="knob-label">UHF</div>
            </div>
        </div>
    </div>

    <!-- LIGHTBOX -->
    <div id="lightbox">
        <img id="lightbox-image" src="" alt="">
        <div class="lightbox-controls">
            <button class="lightbox-btn" onclick="prevLightboxImage()">◀ Prev</button>
            <div id="lightbox-counter"></div>
            <button class="lightbox-btn" onclick="nextLightboxImage()">Next ▶</button>
            <button class="lightbox-btn" onclick="closeLightbox()" style="margin-left:30px;">Close</button>
        </div>
    </div>

    <script>
        let currentMode = 'vhf';
        let vhfIndex = 0;
        let uhfIndex = 0;
        let lastMode = 'vhf';
        let scheduleData = { vhf: [], uhf: [] };
        let vRot = 0;
        let uRot = 0;
        let guideScrollRAF = null;

        let currentGalleryImages = [];
        let currentLightboxIndex = 0;

        async function loadSchedule() {
            try {
                const res = await fetch('https://retro-tv-website.onrender.com/api/schedule');
                if (!res.ok) throw new Error();
                scheduleData = await res.json();
            } catch (err) {
                console.error("Using fallback data");
                scheduleData = {
                    vhf: [
                        { id: "home", name: "HOME", schedule: "Welcome message" },
                        { id: "writing", name: "WRITING", schedule: "Random Encounters" },
                        { id: "games", name: "GAMES", schedule: "Retro gaming hub" },
                        { id: "pixelart", name: "PIXEL ART", schedule: "Pixel Art Galleries", presentation: "gallery", media: [] },
                        { id: "films", name: "FILMS", schedule: "Film related content" },
                        { id: "tv", name: "TV", schedule: "TV related content" },
                        { id: "where", name: "WHERE CAN YOU FIND ME?", schedule: "Social links" }
                    ],
                    uhf: [
                        { id: "uhf1", name: "CARTOONS", schedule: "Public Domain Cartoons" },
                        { id: "uhf2", name: "CARTOONS", schedule: "More Public Domain Cartoons" },
                        { id: "uhf3", name: "TV SHOWS", schedule: "Classic Public Domain TV" },
                        { id: "uhf4", name: "TV SHOWS", schedule: "More Classic TV" },
                        { id: "uhf5", name: "FILMS", schedule: "Double Indemnity - All day" },
                        { id: "uhf6", name: "FILMS", schedule: "More Public Domain Films" }
                    ]
                };
            }
        }

        function generateContent() {
            const container = document.getElementById('content');
            container.innerHTML = '';

            // VHF Channels
            scheduleData.vhf.forEach((ch, i) => {
                const div = document.createElement('div');
                div.id = ch.id;
                div.className = 'section vhf-section';
                div.innerHTML = `<h2 class="channel-title">VHF ${i + 2} • ${ch.name}</h2><p>${ch.schedule || ''}</p>`;
                container.appendChild(div);
            });

            // UHF Channels
            scheduleData.uhf.forEach((ch, i) => {
                const div = document.createElement('div');
                div.id = ch.id;
                div.className = 'section uhf-section';
                div.innerHTML = `<h2 class="channel-title">UHF ${i + 2} • ${ch.name}</h2><p>${ch.schedule || ''}</p>`;
                container.appendChild(div);
            });

            // VHF Guide
            const vGuide = document.createElement('div');
            vGuide.id = 'vhfguide';
            vGuide.className = 'section vhf-section';
            let vRows = '';
            scheduleData.vhf.forEach((ch, i) => {
                vRows += `<div class="guide-entry" onclick="jumpToVHF(${i+1})">VHF ${i+2}</div><div class="guide-entry" onclick="jumpToVHF(${i+1})">${ch.name}</div>`;
            });
            vGuide.innerHTML = `
                <h2 class="channel-title">VHF 0 • CHANNEL GUIDE</h2>
                <div class="guide-scroll-container">
                    <div class="guide-grids-wrapper">
                        <div class="guide-grid">${vRows}</div>
                        <div class="guide-grid">${vRows}</div>
                        <div class="guide-grid">${vRows}</div>
                    </div>
                </div>
            `;
            container.appendChild(vGuide);

            // UHF Guide
            const uGuide = document.createElement('div');
            uGuide.id = 'uhfguide';
            uGuide.className = 'section uhf-section';
            let uRows = '';
            scheduleData.uhf.forEach((ch, i) => {
                uRows += `<div class="guide-entry" onclick="jumpToUHF(${i+1})">UHF ${i+2}</div><div class="guide-entry" onclick="jumpToUHF(${i+1})">${ch.name}</div>`;
            });
            uGuide.innerHTML = `
                <h2 class="channel-title">UHF 0 • CHANNEL GUIDE</h2>
                <div class="guide-scroll-container">
                    <div class="guide-grids-wrapper">
                        <div class="guide-grid">${uRows}</div>
                        <div class="guide-grid">${uRows}</div>
                        <div class="guide-grid">${uRows}</div>
                    </div>
                </div>
            `;
            container.appendChild(uGuide);
        }

        function updateDisplay() {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));

            if (currentMode === 'vhf') {
                if (vhfIndex === 0) {
                    const guide = document.getElementById('vhfguide');
                    if (guide) guide.classList.add('active');
                } else {
                    const ch = scheduleData.vhf[vhfIndex - 1];
                    if (ch && document.getElementById(ch.id)) {
                        document.getElementById(ch.id).classList.add('active');
                    }
                }
            } else {
                if (uhfIndex === 0) {
                    const guide = document.getElementById('uhfguide');
                    if (guide) guide.classList.add('active');
                } else {
                    const ch = scheduleData.uhf[uhfIndex - 1];
                    if (ch && document.getElementById(ch.id)) {
                        document.getElementById(ch.id).classList.add('active');
                    }
                }
            }
        }

        function nextVHF() {
            if (lastMode !== 'vhf') vhfIndex = 0;
            else vhfIndex = (vhfIndex + 1) % (scheduleData.vhf.length + 1);
            currentMode = 'vhf';
            lastMode = 'vhf';
            vRot = (vRot + 45) % 360;
            document.getElementById('vhfKnob').style.transform = `rotate(${vRot}deg)`;
            updateDisplay();
        }

        function nextUHF() {
            if (lastMode !== 'uhf') uhfIndex = 0;
            else uhfIndex = (uhfIndex + 1) % (scheduleData.uhf.length + 1);
            currentMode = 'uhf';
            lastMode = 'uhf';
            uRot = (uRot + 45) % 360;
            document.getElementById('uhfKnob').style.transform = `rotate(${uRot}deg)`;
            updateDisplay();
        }

        function jumpToVHF(index) {
            currentMode = 'vhf';
            vhfIndex = index;
            updateDisplay();
        }

        function jumpToUHF(index) {
            currentMode = 'uhf';
            uhfIndex = index;
            updateDisplay();
        }

        async function init() {
            await loadSchedule();
            generateContent();
            updateDisplay();
        }

        document.getElementById('vhfKnob').addEventListener('click', nextVHF);
        document.getElementById('uhfKnob').addEventListener('click', nextUHF);

        init();
    </script>
</body>
</html>
