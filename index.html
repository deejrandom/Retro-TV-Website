<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warren C. Bennett's Retro Future</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --neon-green: #39ff14;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #0a0a1f 0%, #1a0033 100%);
            color: var(--neon-blue);
            font-family: 'Press Start 2P', cursive;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        
        .tv-frame {
            width: 100%;
            max-width: 980px;
            aspect-ratio: 16 / 12.5;
            background: #1a1a1a;
            border: 32px solid #111;
            border-radius: 12px;
            box-shadow: 0 0 80px var(--neon-pink), 
                        0 0 140px var(--neon-blue),
                        inset 0 0 60px rgba(0,0,0,0.95);
            position: relative;
            z-index: 2;
            padding: 22px;
            display: flex;
            flex-direction: column;
        }
        
        .screen {
            flex: 1;
            background: #000;
            border: 12px solid #222;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9);
            position: relative;
        }
        
        .screen::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                transparent 0px,
                transparent 2px,
                rgba(255,255,255,0.055) 2px,
                rgba(255,255,255,0.055) 4px
            );
            pointer-events: none;
            z-index: 5;
            animation: scanline 4s linear infinite;
        }
        
        .content { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            position: relative;
            z-index: 6;
        }
        
        .section { display: none; }
        .section.active { display: block; }
        
        .channel-title {
            font-size: 17px;
            color: var(--neon-green);
            margin-bottom: 12px;
            text-shadow: 0 0 10px var(--neon-green);
            border-bottom: 3px solid var(--neon-green);
            padding-bottom: 6px;
        }
        
        .right-panel {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 15px;
        }
        
        .knob {
            width: 54px;
            height: 54px;
            background: radial-gradient(circle at 30% 30%, #666, #222);
            border: 6px solid #111;
            border-radius: 50%;
            margin: 0 auto;
            box-shadow: inset 0 0 12px #000, 0 0 14px var(--neon-green);
            position: relative;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        
        .knob::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 20px;
            background: #ffcc00;
            transform: translate(-50%, -50%) rotate(45deg);
        }
        
        .knob-label {
            text-align: center;
            font-size: 10px;
            color: #ffcc00;
            margin-top: 6px;
            text-shadow: 0 0 6px #ffcc00;
            font-weight: bold;
        }
        
        .guide-grid {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 6px 14px;
            font-size: 12px;
            background: #0a0a1f;
            padding: 10px;
            border: 2px solid #334455;
        }
        
        .guide-entry {
            cursor: pointer;
            padding: 6px 8px;
            transition: all 0.1s ease;
        }
        
        .guide-entry:hover {
            background: rgba(57, 255, 20, 0.15);
            color: var(--neon-green);
        }
        
        .guide-channel-num {
            color: #ffcc00;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="tv-frame">
        <div class="screen">
            <div class="content"></div>
            
            <div class="static" id="staticOverlay"></div>
            <div class="no-signal-text" id="noSignalText">NO SIGNAL<br><span style="font-size:11px;">CHANNEL OFF AIR</span></div>
        </div>
        
        <div class="right-panel">
            <div>
                <div class="knob" id="vhfKnob"></div>
                <div class="knob-label">VHF</div>
            </div>
            <div>
                <div class="knob" id="uhfKnob"></div>
                <div class="knob-label">UHF</div>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'vhf';
        let vhfIndex = 0;
        let uhfIndex = 0;
        let lastMode = 'vhf';
        let scheduleData = { vhf: [], uhf: [] };

        async function loadSchedule() {
            try {
                const res = await fetch('https://retro-tv-backend.onrender.com/api/schedule');
                scheduleData = await res.json();
            } catch (e) {
                console.error("Using fallback data");
            }
        }

            const container = document.querySelector('.content');
            container.innerHTML = '';

            // VHF channels
            scheduleData.vhf.forEach((ch, i) => {
                const div = document.createElement('div');
                div.id = ch.id;
                div.className = 'section vhf-section';
                const channelNum = i + 2;
                div.innerHTML = `<h2 class="channel-title">VHF ${channelNum} • ${ch.name}</h2><p>${ch.schedule}</p>`;
                container.appendChild(div);
            });

            // UHF channels
            scheduleData.uhf.forEach((ch, i) => {
                const div = document.createElement('div');
                div.id = ch.id;
                div.className = 'section uhf-section';
                const channelNum = i + 2;
                div.innerHTML = `<h2 class="channel-title">UHF ${channelNum} • ${ch.name}</h2><p>${ch.schedule}</p>`;
                container.appendChild(div);
            });

            vGuide.className = 'section vhf-section';

            vhtml += `<div style="color:#ffcc00; font-size:11px; margin-bottom:10px; text-align:center;">MONDAY • JUNE 17, 2026</div>`;
            vhtml += `<div class="guide-grid">`;

            vhtml += `<div class="guide-entry" onclick="showVHFGuide()">VHF GUIDE</div>`;
